name: Update Grocery Tracker Workbook

on:
  push:
    paths:
      - "data/grocery_trips/**"
      - "data/meal_logs/**"
      - "data/waste_logs/**"
      - "data/inventory_snapshot.md"
      - "data/reconciliation_log.md"
      - "scripts/update_tracker.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild-workbook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Regenerate workbook
        run: python scripts/update_tracker.py

      - name: Commit updated workbook
        run: |
          git config user.name "grocery-tracker-bot"
          git config user.email "actions@github.com"
          git add data/grocery_tracker.xlsx
          git diff --cached --quiet || git commit -m "auto: regenerate grocery_tracker.xlsx from source logs"
          git push
